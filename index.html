<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Geometry Dash</title>
    <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="themes/geometrydashlite.io/rs/css/home.css?v=1">
</head>

<body>
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
        }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        #loader {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
        }
        .logo { position: absolute; max-width: 100vw; max-height: 70vh; top: 300px; }
        .pos_progress { position: absolute; bottom: 15%; width: 100%; }
        .progress { margin: 1.5em auto; max-width: 436px; display: none; position: relative; }
        .full { width: 97%; transform-origin: top left; }
    </style>

    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="image/loading.png?v=1">
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png"></div>
            </div>
        </div>
    </div>

    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'GeometryDashLite.data.unityweb', parts: 2 },
          { name: 'GeometryDashLite.wasm.code.unityweb', parts: 1 },
          { name: 'GeometryDashLite.wasm.framework.unityweb', parts: 1 },
        ],
        basePath: 'Build/',
        debug: true
      };  
    </script>

    <script src="merge.js"></script>
    
    <script src="Build/UnityLoader.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            const loader = document.querySelector("#loader");
            if (!gameInstance.progress) {
                const progressDiv = document.querySelector("#loader .progress");
                progressDiv.style.display = "block";
                gameInstance.progress = progressDiv.querySelector(".full");
            }
            gameInstance.progress.style.transform = `scaleX(${progress})`;
            if (progress === 1 && !gameInstance.removeTimeout) {
                gameInstance.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                }, 2000);
            }
        }
    </script>
</body>
</html>
